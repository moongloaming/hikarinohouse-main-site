<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>採購後台｜HIKARINOHOUSE 賣場</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{--ink:#111827;--deep:#111827;--muted:#566070;--gold:#b8873e;--bg:#fbf7ef;--line:rgba(17,24,39,.12);--card:#fffdf8;--ok:#0a7d33}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
    header{position:sticky;top:0;z-index:10;background:rgba(251,247,239,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .nav{max-width:640px;margin:auto;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:15px}
    .mark{width:32px;height:32px;border-radius:10px;background:var(--deep);color:#fff;display:grid;place-items:center;font-size:17px;font-weight:900}
    .brand small{display:block;font-size:10px;color:var(--muted);font-weight:800}
    .wrap{max-width:640px;margin:auto;padding:10px 12px 60px}
    .btn{border:none;border-radius:999px;font-weight:900;cursor:pointer;font-family:inherit}
    .btn.dark{background:var(--deep);color:#fff}
    .btn.gold{background:var(--gold);color:#fff}
    .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--muted)}
    .btn.sm{padding:8px 14px;font-size:13px;white-space:nowrap}
    .btn[disabled]{opacity:.5;cursor:not-allowed}
    h2{font-size:14px;letter-spacing:.05em;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:6px}
    h2 svg{width:17px;height:17px;flex:none}
    h2 b{color:var(--gold)}
    .list{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .rowitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);flex-wrap:wrap}
    .rowitem:last-child{border-bottom:none}
    .thumb{width:46px;height:46px;border-radius:10px;background:#f2ece0;flex:none;overflow:hidden;display:grid;place-items:center;cursor:pointer}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .info{flex:1;min-width:0;cursor:pointer}
    .info b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .info span{font-size:11px;color:var(--muted);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ctrl{display:flex;align-items:center;gap:6px;margin-left:auto;flex-wrap:wrap}
    .needbadge{font-size:13px;font-weight:900;color:var(--gold);white-space:nowrap;flex:none}
    .qty{width:46px;height:38px;border:1px solid var(--line);border-radius:10px;font-size:16px;font-weight:900;text-align:center;font-family:inherit;flex:none}
    .x{border:none;background:none;color:var(--muted);font-size:17px;cursor:pointer;padding:4px;flex:none;line-height:1}
    .tag{font-size:11px;font-weight:900;padding:3px 9px;border-radius:999px;background:#eee;color:var(--muted);white-space:nowrap;flex:none}
    .tag.can{background:#e7f5ec;color:var(--ok)}
    .tag.no{background:#f3f0ea;color:var(--muted)}
    .tag.done{background:#e7f5ec;color:var(--ok)}
    .empty{color:var(--muted);font-size:13px;padding:16px;text-align:center;background:#fff;border:1px dashed var(--line);border-radius:14px}
    .hint{font-size:11px;color:var(--muted);margin-top:5px}
    .chk{width:20px;height:20px;flex:none;accent-color:var(--gold)}
    .assignbar{display:flex;align-items:center;gap:10px;margin:0 0 8px;font-size:13px;font-weight:800;color:var(--muted)}
    /* 圖片放大 */
    .imgview{position:fixed;inset:0;background:rgba(17,24,39,.85);z-index:60;display:none;align-items:center;justify-content:center;padding:16px}
    .imgview.open{display:flex}
    .imgview img{max-width:96vw;max-height:88vh;border-radius:14px;background:#fff}
    /* 需求明細彈窗 */
    .dmodal{position:fixed;inset:0;background:rgba(17,24,39,.5);z-index:55;display:none;align-items:flex-end;justify-content:center}
    .dmodal.open{display:flex}
    .dcard{background:#fff;border-radius:22px 22px 0 0;width:min(640px,100vw);max-height:70vh;overflow:auto;padding:18px}
    .dcard h3{margin:0 0 4px;font-size:16px}
    .dcard p.sub{margin:0 0 12px;font-size:12px;color:var(--muted)}
    .drow{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
    .drow:last-child{border-bottom:none}
    .drow b{font-weight:900}
    .drow .q{color:var(--gold);font-weight:900;white-space:nowrap}
    /* 通行碼閘 */
    .gate{position:fixed;inset:0;background:var(--bg);display:grid;place-items:center;z-index:50}
    .gatecard{width:min(340px,88vw);background:var(--card);border:1px solid var(--line);border-radius:24px;padding:30px;text-align:center;box-shadow:0 24px 60px rgba(17,24,39,.12)}
    .gatecard input{width:100%;height:48px;border:1px solid var(--line);border-radius:12px;font-size:18px;text-align:center;margin:14px 0;font-family:inherit}
    .hidden{display:none!important}
    .err{color:#d93025;font-size:13px;font-weight:800;min-height:18px;margin:0}
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gatecard">
      <div class="mark" style="margin:0 auto 10px">光</div>
      <b>採購後台</b>
      <p style="font-size:13px;color:var(--muted);margin:6px 0 0">輸入通行碼(問老闆)</p>
      <input id="tokenIn" type="password" placeholder="通行碼" autocomplete="off">
      <p class="err" id="gateErr"></p>
      <button class="btn dark" style="width:100%;padding:12px" id="enterBtn">進入</button>
    </div>
  </div>

  <div class="imgview" id="imgview"><img id="imgviewImg" alt=""></div>
  <div class="dmodal" id="dmodal"><div class="dcard" id="dcard"></div></div>

  <header><div class="nav">
    <div class="brand"><span class="mark">光</span><span>採購後台<small>HIKARINOHOUSE 賣場</small></span></div>
    <div style="display:flex;gap:8px">
      <button class="btn ghost sm" id="refreshBtn">重新整理</button>
      <button class="btn ghost sm" id="logoutBtn" title="登出">✕</button>
    </div>
  </div></header>

  <div class="wrap">
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="16" rx="3"/><path d="M8 3v4M16 3v4M4 10h16"/><path d="M9 15l2 2 4-4"/></svg> 今日採購清單 <b id="todayCount"></b></h2>
    <div id="todayList"></div>
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5h6l1 2h3v14H5V7h3l1-2z"/><path d="M9 13l2 2 4-4"/></svg> 待點收（回公司點貨後入庫） <b id="countCount"></b></h2>
    <div id="countList"></div>
    <p class="hint">按「入庫」= 庫存立即入帳(數字以點收為準);之後到下面「待配單」勾選配貨。</p>
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg> 待採購（未排） <b id="pendCount"></b></h2>
    <div id="pendList"></div>
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg> 待配單 <b id="waitCount"></b></h2>
    <div id="waitList"></div>
    <p class="hint">「自動配單」= 這個商品的訂單依下單順序配到庫存用完(整張單都夠才配);要人工指定,點商品進去對單配。配單後系統自動 LINE 通知客人結單。</p>
    <h2><svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9.5"/></svg> 最近入庫完成</h2>
    <div id="doneList"></div>
  </div>

  <script>
    var $=function(s){return document.querySelector(s)};
    var TOKEN=localStorage.getItem('storeAdminToken')||'';var TODAY='';
    var WAIT=[];var PRODS={};
    function headers(){return {'x-admin-token':TOKEN,'content-type':'application/json'}}

    function gate(show,msg){$('#gate').classList.toggle('hidden',!show);$('#gateErr').textContent=msg||''}
    $('#enterBtn').onclick=function(){TOKEN=$('#tokenIn').value.trim();if(!TOKEN)return;localStorage.setItem('storeAdminToken',TOKEN);load()};
    $('#tokenIn').addEventListener('keydown',function(e){if(e.key==='Enter')$('#enterBtn').click()});
    $('#logoutBtn').onclick=function(){localStorage.removeItem('storeAdminToken');TOKEN='';gate(true)};
    $('#refreshBtn').onclick=function(){load()};
    $('#imgview').onclick=function(){this.classList.remove('open')};
    $('#dmodal').onclick=function(e){if(e.target===this)this.classList.remove('open')};

    function load(){
      if(!TOKEN){gate(true);return}
      Promise.all([
        fetch('/store/api/admin/purchases',{headers:headers()}),
        fetch('/store/api/admin/waiting',{headers:headers()})
      ]).then(function(rs){
        if(rs[0].status===401||rs[1].status===401){gate(true,'通行碼不對,再試一次');localStorage.removeItem('storeAdminToken');TOKEN='';throw 0}
        return Promise.all([rs[0].json(),rs[1].json()]);
      }).then(function(ds){
        gate(false);
        TODAY=(ds[0]&&ds[0].today)||'';
        WAIT=(ds[1]&&ds[1].orders)||[];PRODS=(ds[1]&&ds[1].products)||{};
        render((ds[0]&&ds[0].rows)||[]);
        renderWait();
      }).catch(function(e){if(e!==0)alert('載入失敗,請重試')});
    }

    var BAG='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#c9c2b4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>';

    function post(path,body,btn,confirmMsg){
      if(confirmMsg&&!confirm(confirmMsg))return;
      if(btn)btn.disabled=true;
      fetch(path,{method:'POST',headers:headers(),body:JSON.stringify(body)})
        .then(function(x){return x.json()}).then(function(d){if(!(d&&d.ok))alert('失敗:'+((d&&d.error)||'?'));load()})
        .catch(function(){alert('連線失敗');load()});
    }

    // 商品需求明細:誰訂了這個(每張單可人工配單;整單庫存夠才可按)
    function orderAssignable(o){
      return o.lines.length&&o.lines.every(function(l){return ((PRODS[l.barcode]||{}).stock||0)>=l.qty});
    }
    function assignIds(ids,btn){
      if(btn)btn.disabled=true;
      fetch('/store/api/admin/assign',{method:'POST',headers:headers(),body:JSON.stringify({ids:ids})})
        .then(function(x){return x.json()}).then(function(d){
          if(d&&d.results){alert(d.results.map(function(r){return (r.no||r.id)+':'+r.result}).join('\n'))}
          else{alert('失敗:'+((d&&d.error)||'?'))}
          $('#dmodal').classList.remove('open');load();
        }).catch(function(){alert('連線失敗');load()});
    }
    function showDemand(r){
      var rows=[];
      WAIT.forEach(function(o){
        o.lines.forEach(function(l){
          if(l.barcode===r.barcode)rows.push({o:o,qty:l.qty});
        });
      });
      var stock=(PRODS[r.barcode]||{}).stock||0;
      var card=$('#dcard');
      card.innerHTML='<h3>'+(r.name||r.barcode)+'</h3><p class="sub">目前庫存 '+stock+' 個・點「配單」人工指定(整張單庫存都夠才能配)</p>'+
        (rows.length?'':'<div class="empty">沒有待配訂單訂這個商品</div>');
      rows.forEach(function(x){
        var can=orderAssignable(x.o);
        var d=document.createElement('div');d.className='drow';
        var multi=x.o.lines.length>1?('<br><small style="color:var(--muted)">整單:'+x.o.lines.map(function(l){return (l.name||l.barcode)+'×'+l.qty}).join('、')+'</small>'):'';
        d.innerHTML='<span><b>'+x.o.no+'</b>　'+(x.o.customer||'')+'　<span class="q">×'+x.qty+'</span>'+multi+'</span>'+
          '<span>'+(can?'<button class="btn gold sm">配單</button>':'<span class="tag no">缺貨</span>')+'</span>';
        if(can){d.querySelector('.btn').onclick=function(){if(confirm('把庫存配給 '+x.o.no+'?'))assignIds([x.o.id],this)}}
        card.appendChild(d);
      });
      $('#dmodal').classList.add('open');
    }

    function rowEl(r,rightHtml,subHtml){
      var d=document.createElement('div');d.className='rowitem';
      d.innerHTML='<div class="thumb">'+(r.img?('<img src="'+r.img+'" alt="" loading="lazy">'):BAG)+'</div>'+
        '<div class="info"><b>'+(r.name||'(未命名商品)')+'</b><span>'+(subHtml||r.barcode)+'</span></div>'+'<div class="ctrl">'+rightHtml+'</div>';
      d.querySelector('.thumb').onclick=function(){
        if(!r.img)return;
        $('#imgviewImg').src=r.img;$('#imgview').classList.add('open');
      };
      d.querySelector('.info').onclick=function(){showDemand(r)};
      return d;
    }

    function listBox(target,rowsArr,build,emptyText){
      var box=$(target);box.innerHTML='';
      if(!rowsArr.length){box.innerHTML='<div class="empty">'+emptyText+'</div>';return}
      var l=document.createElement('div');l.className='list';
      rowsArr.forEach(function(r){l.appendChild(build(r))});
      box.appendChild(l);
    }

    function render(rows){
      var pendAll=rows.filter(function(r){return r.status==='待採購'&&r.need>0});
      var counting=pendAll.filter(function(r){return r.bought>0});
      var todayRows=pendAll.filter(function(r){return r.plan===TODAY&&TODAY&&r.bought<r.need});
      var pend=pendAll.filter(function(r){return !(r.plan===TODAY&&TODAY)&&!(r.bought>0)});
      var done=rows.filter(function(r){return r.status==='入庫完成'}).slice(0,10);

      $('#todayCount').textContent=todayRows.length?('('+todayRows.length+')'):'';
      $('#countCount').textContent=counting.length?('('+counting.length+')'):'';
      $('#pendCount').textContent=pend.length?('('+pend.length+')'):'';

      listBox('#todayList',todayRows,function(r){
        var left=r.need-r.bought;
        var d=rowEl(r,'<span class="needbadge">'+(r.bought>0?('還差 '+left+' 個'):('缺 '+r.need+' 個'))+'</span>'+
          '<input class="qty" type="number" min="0" value="0" title="這次買到幾個">'+
          '<button class="btn ghost sm plus1">+1</button><button class="btn ghost sm plus3">+3</button>'+
          '<button class="btn gold sm">買到</button>'+
          '<button class="btn dark sm allbuy">全買到</button>'+
          '<button class="x" title="移出">✕</button>',
          (r.bought>0?('已買 '+r.bought+'　'):'')+r.barcode);
        var inp=d.querySelector('.qty');
        d.querySelector('.btn.gold').onclick=function(){
          var q=parseInt(inp.value,10)||0;if(q<1)return alert('數量要 ≥1');
          post('/store/api/admin/bought',{id:r.id,bought:r.bought+q},this);
        };
        d.querySelector('.plus1').onclick=function(){inp.value=(parseInt(inp.value,10)||0)+1};
        d.querySelector('.plus3').onclick=function(){inp.value=(parseInt(inp.value,10)||0)+3};
        d.querySelector('.allbuy').onclick=function(){post('/store/api/admin/bought',{id:r.id,bought:r.need},this)};
        d.querySelector('.x').onclick=function(){post('/store/api/admin/plan',{id:r.id,plan:false},this)};
        return d;
      },'還沒排今天要買的,從下面按「排今天」');

      listBox('#countList',counting,function(r){
        var d=rowEl(r,'<span class="needbadge">買到 '+r.bought+' 個</span>'+
          '<input class="qty" type="number" min="1" value="'+r.bought+'" title="點收數量">'+
          '<button class="btn gold sm">入庫</button><button class="x" title="取消買到">✕</button>');
        d.querySelector('.btn.gold').onclick=function(){
          var q=parseInt(d.querySelector('.qty').value,10)||0;if(q<1)return alert('數量要 ≥1');
          post('/store/api/admin/arrive',{id:r.id,bought:q},this,'「'+r.name+'」點收入庫 '+q+' 個?庫存會立即入帳。');
        };
        d.querySelector('.x').onclick=function(){post('/store/api/admin/bought',{id:r.id,bought:0},this,'取消「'+r.name+'」的買到紀錄?')};
        return d;
      },'－');

      listBox('#pendList',pend,function(r){
        var d=rowEl(r,'<span class="needbadge">×'+r.need+'</span><button class="btn dark sm">排今天</button>');
        d.querySelector('.btn.dark').onclick=function(){post('/store/api/admin/plan',{id:r.id,plan:true},this)};
        return d;
      },'目前沒有要買的東西');

      listBox('#doneList',done,function(r){
        return rowEl(r,'<span class="tag done">完成 '+r.bought+'</span>');
      },'－');
    }

    function renderWait(){
      // 依商品彙總:{barcode:{qty,orders[]}}
      var agg={};
      WAIT.forEach(function(o){
        o.lines.forEach(function(l){
          if(!agg[l.barcode])agg[l.barcode]={qty:0,orders:[]};
          agg[l.barcode].qty+=l.qty;
          if(agg[l.barcode].orders.indexOf(o.id)<0)agg[l.barcode].orders.push(o.id);
        });
      });
      var barcodes=Object.keys(agg);
      $('#waitCount').textContent=barcodes.length?('('+barcodes.length+' 商品/'+WAIT.length+' 單)'):'';
      var box=$('#waitList');box.innerHTML='';
      if(!barcodes.length){box.innerHTML='<div class="empty">沒有等待配貨的訂單</div>';return}
      var l=document.createElement('div');l.className='list';
      barcodes.forEach(function(bc){
        var meta=PRODS[bc]||{};var a2=agg[bc];
        var r={barcode:bc,name:meta.name||bc,img:meta.img||''};
        var stock=meta.stock||0;
        var d=rowEl(r,'<span class="needbadge">訂單 '+a2.qty+' 個・庫存 '+stock+'</span>'+
          '<button class="btn gold sm autoassign">自動配單</button>');
        d.querySelector('.autoassign').onclick=function(){
          if(!confirm('「'+r.name+'」自動配單?(這個商品的訂單依下單順序配到庫存用完)'))return;
          assignIds(a2.orders.slice().sort(function(x,y){return x-y}),this);
        };
        l.appendChild(d);
      });
      box.appendChild(l);
    }

    load();
  </script>
</body>
</html>
