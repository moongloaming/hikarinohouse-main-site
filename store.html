<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商店｜HIKARINOHOUSE 光・日本代購賣場</title>
  <meta name="description" content="HIKARINOHOUSE 光 日本代購賣場：精選日本商品，LINE 登入下單，日本端採購集運一站處理。">
  <meta name="theme-color" content="#252525">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://hikarinohouse.com/store">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&display=swap" rel="stylesheet">
  <style>
    /* Aesop 語彙:紙色平面、細線框、襯線標題、零陰影零圓角(Owner 2026-07-02 指示) */
    :root{--ink:#252525;--deep:#252525;--muted:#6a6a61;--gold:#8a7350;--bg:#fffef2;--line:#ddd9c7;--card:#fffef2;--max:1120px;--serif:'Noto Serif TC','Songti TC','Hiragino Mincho ProN','Yu Mincho',serif}
    *{box-sizing:border-box}html{scroll-behavior:smooth}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Noto Sans JP",Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
    a{text-decoration:none;color:inherit}
    .wrap{width:min(var(--max),calc(100% - 44px));margin:auto}
    header{position:sticky;top:0;z-index:30;background:rgba(255,254,242,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    .nav{height:74px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:center;gap:12px}
    .mark{width:38px;height:38px;border-radius:0;background:var(--deep);color:var(--bg);display:grid;place-items:center;font-size:20px;font-weight:600;font-family:var(--serif)}
    .brand strong{display:block;letter-spacing:.16em;font-size:15px;font-weight:600;font-family:var(--serif)}.brand span{display:block;font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.22em}
    .navbtns{display:flex;align-items:center;gap:12px}
    .iconbtn{position:relative;border:1px solid var(--ink);background:transparent;border-radius:0;padding:9px 18px;font-weight:500;font-size:13px;letter-spacing:.1em;cursor:pointer;font-family:inherit;color:var(--ink)}
    .badge{position:absolute;top:-7px;right:-7px;min-width:18px;height:18px;border-radius:0;background:var(--ink);color:var(--bg);font-size:11px;font-weight:500;display:grid;place-items:center;padding:0 4px}
    .me{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.04em}
    .tools{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:30px 0 20px}
    .search{flex:1;min-width:200px;position:relative}
    .search input{width:100%;height:46px;border:1px solid var(--line);border-radius:0;padding:0 18px 0 42px;font-size:15px;background:transparent;font-family:inherit;color:var(--ink)}
    .search input:focus{outline:none;border-color:var(--ink)}
    .search:before{content:"⌕";position:absolute;left:16px;top:9px;font-size:22px;color:var(--muted)}
    .cats{display:flex;gap:4px 20px;flex-wrap:wrap}
    .chip{padding:8px 2px;border:none;border-bottom:1px solid transparent;border-radius:0;background:none;color:var(--muted);font-weight:500;font-size:14px;letter-spacing:.04em;cursor:pointer;font-family:inherit}
    .chip.on{color:var(--ink);border-bottom-color:var(--ink);background:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:36px 24px;margin:16px 0 80px}
    .prod{background:none;border:none;border-radius:0;box-shadow:none;overflow:hidden;display:flex;flex-direction:column}
    .thumb{aspect-ratio:1/1;background:#f0eee0;display:grid;place-items:center;color:#c9bda6;font-size:46px}
    .thumb img{width:100%;height:100%;object-fit:cover}
    /* Aesop 字級節奏:小(分類)→大(名稱)→中(簡介)→小(原名)→中(價格);置中、行距大 */
    .pbody{padding:20px 8px 0;display:flex;flex-direction:column;flex:1;align-items:center;text-align:center}
    .pcat{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.28em;margin-bottom:10px}
    .pname{font-size:18px;font-weight:600;font-family:var(--serif);margin:0 0 8px;line-height:1.5}
    .pdesc{font-size:13px;color:var(--muted);line-height:1.8;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
    .pja{font-size:11px;color:var(--muted);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-bottom:12px}
    .price{font-size:15px;font-weight:500;margin-top:auto;letter-spacing:.04em;font-family:var(--serif)}
    .price small{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap}
    #sub,#fee,#total,.citem .ci-n span{font-family:var(--serif)} /* 價格數字統一襯線 */
    .pbreak{font-size:11px;color:var(--muted);font-weight:400;margin-top:4px}
    .prod .thumb{position:relative}
    .ptag{position:absolute;top:0;left:0;font-size:11px;font-weight:500;letter-spacing:.12em;padding:5px 12px;border-radius:0;color:var(--ink);background:rgba(255,254,242,.94)}
    .ptag.out{color:var(--muted)}
    .ptag.pre{color:var(--gold)}
    .addbtn{margin-top:14px;width:100%;border:1px solid var(--ink);background:var(--ink);color:var(--bg);border-radius:0;padding:12px;font-weight:500;font-size:13px;letter-spacing:.14em;cursor:pointer;font-family:inherit;transition:background .15s ease,border-color .15s ease}
    .addbtn:hover{background:#3d3d3d;border-color:#3d3d3d}
    .addbtn:active{transform:scale(.99)}
    .addbtn[disabled]{border-color:var(--line);color:var(--muted);background:transparent;cursor:not-allowed}
    .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 0}
    .scrim{position:fixed;inset:0;background:rgba(37,37,37,.4);z-index:40;display:none}
    .scrim.open{display:block}
    .drawer{position:fixed;top:0;right:0;height:100%;width:min(390px,92vw);background:var(--bg);border-left:1px solid var(--line);z-index:50;transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column}
    .drawer.open{transform:translateX(0)}
    .dhead{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line)}
    .dhead b{font-size:17px;font-weight:600;font-family:var(--serif);letter-spacing:.08em}
    .x{border:none;background:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1}
    .ditems{flex:1;overflow:auto;padding:8px 22px}
    .citem{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
    .citem .ci-n{flex:1;min-width:0}.citem .ci-n b{font-size:14px;font-weight:600;display:block;line-height:1.3;font-family:var(--serif)}.citem .ci-n span{font-size:13px;color:var(--muted)}
    .qty{display:flex;align-items:center;gap:10px}
    .qty button{width:28px;height:28px;border:1px solid var(--line);background:transparent;border-radius:0;font-size:16px;cursor:pointer;line-height:1;color:var(--ink)}
    .dfoot{padding:18px 22px;border-top:1px solid var(--line)}
    .totalrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
    .totalrow b{font-size:20px;font-weight:600;font-family:var(--serif)}
    .hint{font-size:12px;color:var(--muted);margin-bottom:14px}
    .cta{width:100%;border:1px solid var(--ink);background:var(--ink);color:var(--bg);border-radius:0;padding:15px;font-weight:500;font-size:13px;letter-spacing:.18em;cursor:pointer;font-family:inherit}
    .cta[disabled]{opacity:.45;cursor:not-allowed}
    .gate{position:fixed;inset:0;background:var(--bg);z-index:60;display:grid;place-items:center}
    .gatecard{width:min(380px,90vw);text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:0;padding:46px 34px;box-shadow:none}
    .gatecard .mark{margin:0 auto 18px;width:54px;height:54px;border-radius:0;font-size:28px}
    .gatecard h1{font-size:22px;margin:0 0 6px;font-weight:600;font-family:var(--serif);letter-spacing:.1em}
    .gatecard p{color:var(--muted);font-size:13px;margin:0 0 26px;letter-spacing:.04em}
    .linebtn{width:100%;border:none;background:#06c755;color:#fff;border-radius:2px;padding:14px;font-weight:600;font-size:15px;letter-spacing:.06em;cursor:pointer;font-family:inherit}
    .done{text-align:center;padding:50px 22px}
    .done .ok{width:64px;height:64px;border-radius:50%;background:transparent;border:1px solid #06863a;color:#06863a;font-size:30px;display:grid;place-items:center;margin:0 auto 16px}
    .done b{font-size:19px;display:block;margin-bottom:8px;font-family:var(--serif);font-weight:600}.done p{color:var(--muted);font-size:14px;margin:0 auto;max-width:260px}
    .hidden{display:none!important}
    .prod .thumb,.prod .pname{cursor:pointer}
    /* 商品詳情彈窗 */
    .modal{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;padding:18px}
    .modal.open{display:flex}
    #modal{z-index:80} /* 商品詳情疊在「我的訂單」之上 */
    .lnk{cursor:pointer;text-decoration:underline;text-underline-offset:2px}
    .orditems .lnk{color:var(--gold)}
    .modal .mbg{position:absolute;inset:0;background:rgba(37,37,37,.42)}
    .mcard{position:relative;background:var(--bg);border:1px solid var(--line);border-radius:0;width:min(460px,94vw);max-height:90vh;overflow:auto;box-shadow:none}
    .mcard .mimg{width:100%;aspect-ratio:1/1;background:#f0eee0;display:grid;place-items:center;overflow:hidden}
    .mcard .mimg img{width:100%;height:100%;object-fit:cover}
    .mcard .mx{position:absolute;top:12px;right:12px;width:36px;height:36px;border:1px solid var(--line);border-radius:0;background:rgba(255,254,242,.95);font-size:20px;cursor:pointer;line-height:1;box-shadow:none;color:var(--ink)}
    .mbody{padding:22px 24px 26px}
    .mbody .pcat{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.24em}
    .mbody h2{font-size:20px;margin:8px 0 2px;line-height:1.4;font-weight:600;font-family:var(--serif)}
    .mbody .mja{font-size:13px;color:var(--muted);margin-bottom:14px}
    .mbody .mprice{font-size:22px;font-weight:600;font-family:var(--serif)}
    .mbody .mprice small{font-size:12px;color:var(--muted);font-weight:500}
    .mbody .mfee{font-size:12px;color:var(--gold);font-weight:500;letter-spacing:.04em;margin:2px 0 16px}
    .mbody .mdesc{font-size:14px;color:var(--ink);line-height:1.8;white-space:pre-wrap;border-top:1px solid var(--line);padding-top:14px;margin-bottom:18px}
    .ordrow{border:1px solid var(--line);border-radius:0;padding:12px 14px;margin-bottom:10px}
    .ordrow .ordtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .ordrow b{font-size:15px;font-weight:600}
    .ordstatus{font-size:12px;font-weight:500;letter-spacing:.06em;padding:2px 10px;border-radius:0;background:transparent;border:1px solid var(--line);color:var(--muted)}
    .ordstatus.ready{border-color:#06863a;color:#06863a;background:transparent}
    .orditems{margin:8px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px 0}
    .orditems>div{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
    .orditems>div span:first-child{color:var(--ink)}.orditems>div span:last-child{color:var(--muted);font-weight:500}
    .ordsum{font-size:13px;color:var(--muted);font-weight:500;margin-top:4px;cursor:pointer;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .ordexp{color:var(--gold);font-weight:500}
    .morebtn{width:100%;border:1px solid var(--line);background:transparent;border-radius:0;padding:11px;font-weight:500;font-size:12px;letter-spacing:.12em;color:var(--muted);cursor:pointer;font-family:inherit}
    .ordrow .chkbtn{margin-top:10px;width:100%;border:1px solid var(--ink);background:var(--ink);color:var(--bg);border-radius:0;padding:11px;font-weight:500;font-size:13px;letter-spacing:.14em;cursor:pointer;font-family:inherit}
    .ordrow .chkbtn[disabled]{opacity:.5;cursor:not-allowed}
    @media(max-width:620px){
      .wrap{width:min(var(--max),calc(100% - 28px))}
      .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:26px 14px}
      .nav{height:58px;gap:8px}
      .brand .mark{width:32px;height:32px;font-size:17px;border-radius:0}
      .brand strong{font-size:13px;letter-spacing:.1em}
      .brand>span>span{display:none}
      .me{display:none}
      .navbtns{gap:8px}
      .iconbtn{padding:7px 12px;font-size:12px}
      .pname{font-size:15px}
      .pdesc{font-size:12px;line-height:1.7}
    }
  </style>
</head>
<body>

  <div class="gate" id="gate">
    <div class="gatecard">
      <div class="mark">光</div>
      <h1>HIKARINOHOUSE 商店</h1>
      <p>日本代購賣場・請用 LINE 登入後選購</p>
      <button class="linebtn" id="lineLogin">使用 LINE 登入</button>
    </div>
  </div>

  <header>
    <div class="wrap nav">
      <a class="brand" href="/"><div class="mark">光</div><span><strong>HIKARINOHOUSE</strong><span>日本代購賣場</span></span></a>
      <div class="navbtns">
        <span class="me" id="me"></span>
        <button class="iconbtn" id="openOrders">我的訂單</button>
        <button class="iconbtn" id="openCart">購物車<span class="badge hidden" id="cartBadge">0</span></button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="tools">
      <div class="search"><input type="text" id="q" placeholder="搜尋商品名稱"></div>
      <div class="cats" id="cats"></div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-label="購物車">
    <div class="dhead"><b>購物車</b><button class="x" id="closeCart" aria-label="關閉">×</button></div>
    <div class="ditems" id="ditems"></div>
    <div class="dfoot" id="dfoot">
      <div class="totalrow" style="font-size:14px"><span style="color:var(--muted);font-weight:800">商品小計</span><span id="sub">¥0</span></div>
      <div class="totalrow" style="font-size:14px"><span style="color:var(--muted);font-weight:800">代購費 10%</span><span id="fee" style="color:var(--gold);font-weight:800">¥0</span></div>
      <div class="totalrow"><span style="font-weight:800">合計</span><b id="total">¥0</b></div>
      <div class="hint">運費於日本到貨檢品後另計</div>
      <button class="cta" id="submit" disabled>送出訂單</button>
    </div>
    <div class="done hidden" id="done">
      <div class="ok">✓</div>
      <b>訂單已送出</b>
      <p>我們會在日本代購，到貨後以 LINE 通知您結單出貨。</p>
      <button class="cta" style="background:var(--deep);margin-top:20px" id="keepShopping">繼續選購</button>
    </div>
  </aside>

  <!-- 商品詳情 -->
  <div class="modal" id="modal">
    <div class="mbg" id="mbg"></div>
    <div class="mcard">
      <button class="mx" id="mx">×</button>
      <div class="mimg" id="mimg"></div>
      <div class="mbody">
        <div class="pcat" id="mcat"></div>
        <h2 id="mname"></h2>
        <div class="mja" id="mja"></div>
        <div class="mprice" id="mprice"></div>
        <div class="mfee" id="mfee"></div>
        <div class="mdesc" id="mdesc"></div>
        <button class="cta" id="maddbtn" style="background:var(--deep)">加入購物車</button>
      </div>
    </div>
  </div>

  <!-- 我的訂單 -->
  <div class="modal" id="ordModal">
    <div class="mbg" id="ordBg"></div>
    <div class="mcard">
      <button class="mx" id="ordX">×</button>
      <div class="mbody">
        <h2 style="margin:0 0 4px">我的訂單</h2>
        <div class="mja" style="margin-bottom:14px">配單完成後可按「結單」，我們才會安排檢品出貨</div>
        <div id="ordList"></div>
      </div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
  (function(){
    var LIFF_ID='2010571814-0TlMduee';
    var lineUserId='', memberRate=null;
    var CATS=['伴手禮・零食甜點','咖啡・茶・超商速食','卡通・IP角色','玩具・模型・一番賞','美妝・藥妝','服飾・潮牌','生活雜貨・百元店','家電・3C','神社・御守','景點・限定・美術館','其他'];
    var SAMPLE=[
      {id:'1900021535712',zh:'無袖背心',ja:'【25quee】プリントサテンタンク',price:5280,cat:'服飾・潮牌',img:''},
      {id:'4974012083510',zh:'Toy Story 洗衣袋',ja:'トイ・ストーリー 洗濯ネット',price:429,cat:'卡通・IP角色',img:''},
      {id:'4974012083367',zh:'Toy Story 透明視窗收納包',ja:'トイ・ストーリー 窓付きポーチ',price:429,cat:'卡通・IP角色',img:''}
    ];
    var FEE_RATE=0.1; // 代購費率；後端「系統設定」有值時會覆蓋（loadProducts 取得）
    var products=[],cart={},cat='全部',q='';
    // 規模化(~5000 SKU):伺服器端分頁。products=目前條件下已載入的頁面;KNOWN=看過的所有商品(購物車金額靠它,不受換頁影響)
    var KNOWN={};
    var page=1,totalCount=0,hasMore=false,loadingMore=false;
    var PS=parseInt(new URLSearchParams(location.search).get('ps'),10)||50; // 每頁筆數(?ps= 可調,示範/測試用)
    var $=function(s){return document.querySelector(s)};
    var yen=function(n){return Math.round(n).toLocaleString()+'円'};
    var yenTax=function(n){return yen(n)+'(税込)'}; // 卡片/合計的日式標價(Owner 指定)
    var jpyRate=0; // JPY→TWD（loadProducts 取得；0=暫無匯率,不顯示台幣參考價）
    var nt=function(n){return '$ '+Math.round(n).toLocaleString()+' TWD'};
    var ntApprox=function(y){return jpyRate>0?('（約 '+nt(y*jpyRate)+'）'):''}; // 台幣參考價,實際依下單匯率快照
    // 商品有指定代購費率(含0)就用它,否則用全站/會員費率
    var rateOf=function(p){return (p&&p.feeRate!=null&&p.feeRate!=='')?Number(p.feeRate):FEE_RATE;};
    var toHand=function(p){return Math.round(p.price*(1+rateOf(p)));}; // 到手單價
    var pct=function(r){return Math.round(r*1000)/10;}; // 0.1 → 10（保留一位小數）

    function afterLogin(){ $('#gate').classList.add('hidden'); loadProducts(); }
    // 登入後查會員身分 + 費率（未綁定則引導回 bot 綁定）
    function fetchMe(){
      if(!lineUserId) return Promise.resolve();
      return fetch('/store/api/me?uid='+encodeURIComponent(lineUserId)).then(function(r){return r.json()}).then(function(m){
        if(m&&m.found){ if(typeof m.feeRate==='number'){memberRate=m.feeRate;FEE_RATE=m.feeRate;} $('#me').textContent=(m.name||'會員')+'・'+(m.tier||''); }
        else { $('#me').textContent='尚未綁定（請回 LINE 客服輸入「綁定」）'; }
      }).catch(function(){});
    }
    // LIFF 登入：在 LINE 內自動帶身分；一般瀏覽器會導向 LINE 登入；非 LINE 環境用預覽 fallback
    function startLiff(){
      if(!window.liff){ manualFallback(); return; }
      liff.init({liffId:LIFF_ID}).then(function(){
        if(liff.isLoggedIn()){
          liff.getProfile().then(function(p){ lineUserId=p.userId; $('#me').textContent=p.displayName||'已登入'; fetchMe().then(afterLogin); })
            .catch(function(){ afterLogin(); });
        } else {
          $('#lineLogin').textContent='使用 LINE 登入';
          $('#lineLogin').onclick=function(){ liff.login(); };
        }
      }).catch(function(){ manualFallback(); });
    }
    function manualFallback(){
      $('#lineLogin').onclick=function(){ $('#me').textContent='（預覽模式）'; afterLogin(); };
    }
    startLiff();

    function loadProducts(reset){
      if(reset){page=1}
      loadingMore=true;render();
      var u='/store/api/products?page='+page+'&ps='+PS
        +(cat&&cat!=='全部'?('&cat='+encodeURIComponent(cat)):'')
        +(q?('&q='+encodeURIComponent(q)):'');
      fetch(u).then(function(r){if(!r.ok)throw 0;return r.json()})
        .then(function(d){
          if(memberRate!=null)FEE_RATE=memberRate; else if(d&&typeof d.feeRate==='number'&&d.feeRate>0)FEE_RATE=d.feeRate;
          if(d&&typeof d.jpyRate==='number'&&d.jpyRate>0)jpyRate=d.jpyRate;
          if(d&&d.categories&&d.categories.length)CATS=d.categories;
          var got=(d&&d.products)||[];
          products=reset?got:products.concat(got);
          got.forEach(function(p){KNOWN[p.id]=p});
          totalCount=(d&&typeof d.total==='number')?d.total:products.length;
          hasMore=!!(d&&d.hasMore);
          if(reset&&!products.length&&!q&&(cat==='全部')){ // 後端沒商品(例如預覽環境)→示範資料
            products=SAMPLE;products.forEach(function(p){KNOWN[p.id]=p});totalCount=products.length;hasMore=false;
          }
          loadingMore=false;render();
        })
        .catch(function(){
          if(page===1&&!products.length){products=SAMPLE;products.forEach(function(p){KNOWN[p.id]=p});totalCount=products.length}
          hasMore=false;loadingMore=false;render();
        });
    }
    function categories(){return ['全部'].concat(CATS)}
    function renderCats(){
      var c=$('#cats');c.innerHTML='';
      categories().forEach(function(name){
        var b=document.createElement('button');b.className='chip'+(name===cat?' on':'');b.textContent=name;
        b.onclick=function(){cat=name;loadProducts(true)};c.appendChild(b);
      });
    }
    function render(){
      renderCats();
      var g=$('#grid');g.innerHTML='';
      var list=products; // 過濾/分頁都在伺服器端做
      if(!list.length&&!loadingMore){g.innerHTML='<div class="empty">找不到符合的商品</div>';return}
      list.forEach(function(p){
        var d=document.createElement('div');d.className='prod';
        var thumb=p.img?('<img src="'+p.img+'" alt="">'):'<svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="#c9c2b4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>';
        var soldout=(p.status==='缺貨');
        var preorder=(p.status==='預購');
        var tag=soldout?'<div class="ptag out">缺貨</div>':(preorder?'<div class="ptag pre">預購</div>':'');
        var btn=soldout?'<button class="addbtn" disabled>暫時缺貨</button>'
                       :'<button class="addbtn">'+(preorder?'預購下單':'加入購物車')+'</button>';
        // Aesop 字級節奏:小(分類)→大(名稱)→中(簡介=敘述)→小(日文原名)→中(價格)
        var brief=p.desc||p.ja||'';
        var subline=p.desc?(p.ja||''):'';
        d.innerHTML='<div class="thumb">'+thumb+tag+'</div>'+
          '<div class="pbody">'+
          '<div class="pcat">'+(p.cat||'')+'</div>'+
          '<div class="pname">'+p.zh+'</div>'+
          '<div class="pdesc">'+brief+'</div>'+
          (subline?('<div class="pja">'+subline+'</div>'):'')+
          '<div class="price">'+yenTax(toHand(p))+'</div>'+
          btn+
          '</div>';
        if(!soldout)d.querySelector('.addbtn').onclick=function(){cart[p.id]=(cart[p.id]||0)+1;updateCart()};
        d.querySelector('.thumb').onclick=function(){openDetail(p)};
        d.querySelector('.pname').onclick=function(){openDetail(p)};
        g.appendChild(d);
      });
      if(loadingMore&&!list.length){var ld=document.createElement('div');ld.className='empty';ld.textContent='載入中…';g.appendChild(ld)}
      if(hasMore||loadingMore&&list.length){
        var m=document.createElement('button');m.className='morebtn';m.style.gridColumn='1/-1';
        m.textContent=loadingMore?'載入中…':('載入更多（還有 '+Math.max(0,totalCount-products.length)+' 件）');
        m.disabled=loadingMore;
        m.onclick=function(){page++;loadProducts(false)};
        g.appendChild(m);
      }
    }
    var curDetail=null;
    function openDetail(p){
      curDetail=p;
      $('#mimg').innerHTML=p.img?('<img src="'+p.img+'" alt="">'):'<svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="#c9c2b4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>';
      $('#mcat').textContent=p.cat||'';
      $('#mname').textContent=p.zh||'';
      $('#mja').textContent=p.ja||'';
      $('#mprice').innerHTML=yenTax(toHand(p))+' <small>'+ntApprox(toHand(p))+'</small>';
      $('#mfee').innerHTML='日本原價 '+yen(p.price)+'　＋代購費'+pct(rateOf(p))+'%';
      $('#mdesc').textContent=p.desc||'';
      $('#mdesc').style.display=p.desc?'block':'none';
      $('#modal').classList.add('open');
    }
    function closeDetail(){$('#modal').classList.remove('open');curDetail=null}
    $('#mx').onclick=closeDetail;
    $('#mbg').onclick=closeDetail;
    $('#maddbtn').onclick=function(){if(curDetail){cart[curDetail.id]=(cart[curDetail.id]||0)+1;updateCart();closeDetail()}};
    function count(){var n=0;for(var k in cart)n+=cart[k];return n}
    // 金額計算走 KNOWN(看過就記住),換頁/換分類後購物車照樣算得出來
    function total(){var t=0;for(var k in cart){var p=KNOWN[k];if(p&&cart[k])t+=p.price*cart[k]}return t}
    function toHandTotal(){var t=0;for(var k in cart){var p=KNOWN[k];if(p&&cart[k])t+=toHand(p)*cart[k]}return t}
    function updateCart(){
      var n=count();var badge=$('#cartBadge');badge.textContent=n;badge.classList.toggle('hidden',n===0);
      var sub=total();var grand=toHandTotal();var fee=grand-sub;
      $('#sub').textContent=yen(sub);
      $('#fee').textContent=yen(fee);
      $('#total').innerHTML=yenTax(grand)+(jpyRate>0?' <small style="color:var(--muted);font-weight:500">'+ntApprox(grand)+'</small>':'');
      $('#submit').disabled=(n===0);
      var box=$('#ditems');box.innerHTML='';
      var keys=Object.keys(cart).filter(function(k){return cart[k]>0});
      if(!keys.length){box.innerHTML='<div class="empty">購物車是空的</div>'}
      keys.forEach(function(k){
        var p=KNOWN[k];if(!p)return;
        var row=document.createElement('div');row.className='citem';
        row.innerHTML='<div class="ci-n"><b class="lnk">'+p.zh+'</b><span>'+yen(toHand(p))+'</span></div>';
        (function(pp){ row.querySelector('.ci-n b').onclick=function(){ openDetail(pp); }; })(p);
        var qd=document.createElement('div');qd.className='qty';
        var m=document.createElement('button');m.textContent='−';m.onclick=function(){cart[k]--;if(cart[k]<=0)delete cart[k];updateCart()};
        var num=document.createElement('span');num.textContent=cart[k];num.style.minWidth='18px';num.style.textAlign='center';num.style.fontWeight='800';
        var pl=document.createElement('button');pl.textContent='+';pl.onclick=function(){cart[k]++;updateCart()};
        qd.appendChild(m);qd.appendChild(num);qd.appendChild(pl);row.appendChild(qd);box.appendChild(row);
      });
    }
    function openCart(o){$('#scrim').classList.toggle('open',o);$('#drawer').classList.toggle('open',o)}
    $('#openCart').onclick=function(){$('#done').classList.add('hidden');$('#dfoot').classList.remove('hidden');$('#ditems').classList.remove('hidden');updateCart();openCart(true)};
    $('#closeCart').onclick=function(){openCart(false)};
    $('#scrim').onclick=function(){openCart(false)};
    var qTimer=null; // 搜尋防抖:停 350ms 才打伺服器
    $('#q').addEventListener('input',function(e){
      clearTimeout(qTimer);
      qTimer=setTimeout(function(){q=e.target.value.trim();loadProducts(true)},350);
    });
    $('#submit').onclick=function(){
      if(count()===0)return;
      var items=Object.keys(cart).map(function(k){var p=KNOWN[k];return{id:k,zh:p?p.zh:'',qty:cart[k]}});
      fetch('/store/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:items,lineUserId:lineUserId})})
        .then(function(){}).catch(function(){}).finally(showDone);
    };
    function showDone(){cart={};updateCart();$('#ditems').classList.add('hidden');$('#dfoot').classList.add('hidden');$('#done').classList.remove('hidden')}
    $('#keepShopping').onclick=function(){openCart(false)};

    // ===== 我的訂單 / 結單 =====
    var ordAll=[], ordShown=0;
    var ACTIONABLE={'已配單':1,'待付款':1};
    function openOrders(){
      if(!lineUserId){ alert('請先用 LINE 登入'); return; }
      $('#ordModal').classList.add('open');
      $('#ordList').innerHTML='<div class="empty">載入中…</div>';
      fetch('/store/api/orders?uid='+encodeURIComponent(lineUserId)).then(function(r){return r.json()}).then(function(d){
        ordAll=(d&&d.orders)||[];
        if(!ordAll.length){ $('#ordList').innerHTML='<div class="empty">還沒有訂單</div>'; return; }
        // 待處理(已配單/待付款)排最前,其餘依新到舊
        ordAll.sort(function(a,b){ return (ACTIONABLE[a.status]?0:1)-(ACTIONABLE[b.status]?0:1) || b.id-a.id; });
        ordShown=0; $('#ordList').innerHTML=''; renderMoreOrders();
      }).catch(function(){ $('#ordList').innerHTML='<div class="empty">載入失敗</div>'; });
    }
    function renderMoreOrders(){
      var PAGE=20, slice=ordAll.slice(ordShown, ordShown+PAGE);
      slice.forEach(function(o){ $('#ordList').appendChild(orderCard(o)); });
      ordShown+=slice.length;
      var old=$('#ordMore'); if(old)old.parentNode.removeChild(old);
      if(ordShown<ordAll.length){
        var m=document.createElement('button'); m.id='ordMore'; m.className='morebtn';
        m.textContent='看更多訂單（剩 '+(ordAll.length-ordShown)+' 筆）'; m.onclick=renderMoreOrders;
        $('#ordList').appendChild(m);
      }
    }
    function orderCard(o){
      var ready=(o.status==='已配單'), act=!!ACTIONABLE[o.status];
      var row=document.createElement('div'); row.className='ordrow';
      // 付款金額/運費=台幣（檢品計算）；商品合計=日圓
      var extra = o.pay?('・付款 '+nt(o.pay)) : (o.freight?('・運費 '+nt(o.freight)):'');
      row.innerHTML='<div class="ordtop"><b>'+o.no+'</b><span class="ordstatus'+(act?' ready':'')+'">'+o.status+'</span></div>'+
        '<div class="ordsum">商品合計 '+yen(o.total)+extra+' <span class="ordexp">看明細 ▾</span></div>'+
        '<div class="orditems" style="display:none"></div>'+
        (ready?'<button class="chkbtn">結單（確認出貨）</button>':'');
      var box=row.querySelector('.orditems'), loaded=false;
      row.querySelector('.ordsum').onclick=function(){
        if(box.style.display==='none'){
          box.style.display='block';
          if(!loaded){ loaded=true; box.innerHTML='<div style="font-size:12px;color:var(--muted)">載入明細…</div>';
            fetch('/store/api/orderitems?id='+o.id+'&uid='+encodeURIComponent(lineUserId)).then(function(r){return r.json()}).then(function(d){
              var its=(d&&d.items)||[];
              box.innerHTML=its.length? its.map(function(it){return '<div><span class="lnk" data-id="'+it.id+'">'+it.zh+' ×'+it.qty+'</span><span>'+yen(it.sub)+'</span></div>'}).join('') : '<div style="font-size:12px;color:var(--muted)">（無明細）</div>';
              [].slice.call(box.querySelectorAll('.lnk')).forEach(function(el){ el.onclick=function(ev){ ev.stopPropagation(); var p=KNOWN[el.getAttribute('data-id')]; if(p){openDetail(p);}else{alert('這個商品目前沒有上架或還沒載入,看不到詳情');} }; });
            }).catch(function(){ box.innerHTML='<div style="font-size:12px;color:var(--muted)">明細載入失敗</div>'; });
          }
        } else { box.style.display='none'; }
      };
      if(ready){ row.querySelector('.chkbtn').onclick=function(){ doCheckout(o.id, row); }; }
      return row;
    }
    function doCheckout(orderId,row){
      var b=row.querySelector('.chkbtn'); b.disabled=true; b.textContent='處理中…';
      fetch('/store/api/checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orderId:orderId})})
        .then(function(r){return r.json()}).then(function(res){
          if(res&&res.ok){ alert('已結單！我們會檢品秤重後以 LINE 通知運費與付款'); }
          else { alert('結單失敗，請稍後再試'); }
          openOrders();
        }).catch(function(){ alert('結單失敗，請稍後再試'); openOrders(); });
    }
    $('#openOrders').onclick=openOrders;
    $('#ordX').onclick=function(){ $('#ordModal').classList.remove('open'); };
    $('#ordBg').onclick=function(){ $('#ordModal').classList.remove('open'); };
  })();
  </script>
</body>
</html>
